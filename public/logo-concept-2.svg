<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Concept 2: The Isometric MT Block (Digital Architecture) -->
  <!-- Left Pillar (M part) -->
  <path d="M 25 45 L 45 35 L 45 85 L 25 95 Z" fill="#FFFFFF" fill-opacity="0.9"/>
  <!-- Center Peak (M + T cross) -->
  <path d="M 45 35 L 60 45 L 60 95 L 45 85 Z" fill="#FFFFFF" fill-opacity="0.6"/>
  <path d="M 60 45 L 75 35 L 75 85 L 60 95 Z" fill="#FFFFFF" fill-opacity="0.8"/>
  <!-- Right Pillar (M part) -->
  <path d="M 75 35 L 95 45 L 95 95 L 75 85 Z" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- T Crossbar top lid floating in 3D projection -->
  <path d="M 25 45 L 45 35 L 60 45 L 75 35 L 95 45 L 60 65 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  <!-- Base anchor dot -->
  <circle cx="60" cy="108" r="3" fill="#FFFFFF"/>
</svg>
