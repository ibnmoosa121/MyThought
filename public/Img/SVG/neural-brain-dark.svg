<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Dark Background to make the neon glow visible on double-click preview -->
    <rect width="100" height="100" fill="#070314" rx="8" />

    <defs>
        <!-- Pink-Purple-Cyan Gradient -->
        <linearGradient id="circuitBrainGradient" x1="0%" y1="40%" x2="100%" y2="60%">
            <stop offset="0%" stop-color="#d946ef" /> <!-- Pink/Fuchsia -->
            <stop offset="35%" stop-color="#a855f7" /> <!-- Purple -->
            <stop offset="70%" stop-color="#3b82f6" /> <!-- Blue -->
            <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
        </linearGradient>

        <!-- Glowing effect for the neon strokes -->
        <filter id="circuitGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Circuit Traces -->
    <g filter="url(#circuitGlow)" stroke="url(#circuitBrainGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- 1. Topmost left-to-center-right trace -->
        <path d="M 33 22 H 41 L 46 17 H 56" />
        <!-- 2. Upper right outer trace -->
        <path d="M 45 27 H 51 L 56 22 H 70" />
        <!-- 3. Upper left to middle right trace -->
        <path d="M 32 32 H 42 L 47 27 H 52 L 60 35 H 74 L 79 30 H 84" />
        <!-- 4. Upper left outer to upper right outer -->
        <path d="M 26 32 H 36 L 42 38 H 56 L 62 32 H 79" />
        <!-- 5. Middle left to middle right -->
        <path d="M 20 42 H 28 L 34 48 H 40 L 46 42 H 68 L 74 48 H 84" />
        <!-- 6. Middle-lower left outer -->
        <path d="M 19 50 H 25 L 30 55 H 36" />
        <!-- 7. Middle left inner to center -->
        <path d="M 32 42 H 36 L 42 48 H 48" />
        <!-- 8. Center to middle right outer -->
        <path d="M 42 42 H 46 L 52 48 H 56 L 60 52 H 70 L 74 48 H 84" />
        <!-- 9. Middle right to middle left -->
        <path d="M 84 41 H 78 L 73 46 H 66 L 62 50 H 54 L 48 56 H 38" />
        <!-- 10. Lower left outer winding to lower right outer -->
        <path d="M 37 63 H 43 L 49 69 H 56 L 62 63 H 68 L 74 57 H 84" />
        <!-- 11. Lower left outer -->
        <path d="M 19 50 H 25 L 33 58 H 39" />
        <!-- 12. Bottom stem trace -->
        <path d="M 66 85 V 77 L 60 71 H 52" />
        <!-- 13. Bottom left inner branch -->
        <path d="M 52 71 L 46 65 H 40" />
        <!-- 14. Bottom right inner branch -->
        <path d="M 60 71 L 66 65 H 70 L 74 61 H 79" />
    </g>

    <!-- Circuit Terminals (Dots) -->
    <g fill="url(#circuitBrainGradient)">
        <circle cx="33" cy="22" r="2.2" />
        <circle cx="56" cy="17" r="2.2" />
        <circle cx="45" cy="27" r="2.2" />
        <circle cx="70" cy="22" r="2.2" />
        <circle cx="32" cy="32" r="2.2" />
        <circle cx="84" cy="30" r="2.2" />
        <circle cx="26" cy="32" r="2.2" />
        <circle cx="79" cy="32" r="2.2" />
        <circle cx="20" cy="42" r="2.2" />
        <circle cx="84" cy="48" r="2.2" />
        <circle cx="19" cy="50" r="2.2" />
        <circle cx="36" cy="55" r="2.2" />
        <circle cx="32" cy="42" r="2.2" />
        <circle cx="48" cy="48" r="2.2" />
        <circle cx="42" cy="42" r="2.2" />
        <circle cx="38" cy="54" r="2.2" />
        <circle cx="37" cy="63" r="2.2" />
        <circle cx="84" cy="57" r="2.2" />
        <circle cx="39" cy="58" r="2.2" />
        <circle cx="66" cy="85" r="2.5" />
        <circle cx="40" cy="65" r="2.2" />
        <circle cx="79" cy="61" r="2.2" />
    </g>
</svg>
