<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <!-- Glow Effect -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring 1 (Dashed) -->
  <circle cx="50" cy="50" r="45" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="10 20" opacity="0.3" />

  <!-- Outer Ring 2 (Dashed) -->
  <circle cx="50" cy="50" r="45" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5 15" opacity="0.2" />

  <!-- Main brain/thought shape -->
  <path d="M50 85C69.33 85 85 69.33 85 50C85 30.67 69.33 15 50 15C30.67 15 15 30.67 15 50C15 69.33 30.67 85 50 85Z" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />

  <!-- Pulsing Inner Neural Network -->
  <path d="M35 50L45 40L55 60L65 50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Upper Branch -->
  <path d="M40 35L50 45L60 35" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />

  <!-- Lower Branch -->
  <path d="M40 65L50 55L60 65" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />

  <!-- Center Thinking Spark -->
  <circle cx="50" cy="50" r="6" fill="#FFFFFF" opacity="0.6" filter="blur(1px)" />

  <!-- Orbiting particles -->
  <circle cx="80" cy="50" r="2" fill="#FFFFFF" opacity="0.8" />
  <circle cx="35" cy="76" r="2" fill="#FFFFFF" opacity="0.8" />
  <circle cx="35" cy="24" r="2" fill="#FFFFFF" opacity="0.8" />
</svg>
