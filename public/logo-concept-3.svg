<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Concept 3: The Aperture of Insight (Vision & Focus) -->
  <!-- Surrounding orbit -->
  <circle cx="60" cy="55" r="45" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8 4" stroke-opacity="0.3"/>
  <!-- Circular Aperture Blades forming an abstract brain/eye -->
  <path d="M 60 20 C 79.33 20, 95 35.67, 95 55 L 75 55 C 75 46.72, 68.28 40, 60 40 Z" fill="#FFFFFF" fill-opacity="0.9"/>
  <path d="M 95 55 C 95 74.33, 79.33 90, 60 90 L 60 70 C 68.28 70, 75 63.28, 75 55 Z" fill="#FFFFFF" fill-opacity="0.7"/>
  <path d="M 60 90 C 40.67 90, 25 74.33, 25 55 L 45 55 C 45 63.28, 51.72 70, 60 70 Z" fill="#FFFFFF" fill-opacity="0.8"/>
  <path d="M 25 55 C 25 35.67, 40.67 20, 60 20 L 60 40 C 51.72 40, 45 46.72, 45 55 Z" fill="#FFFFFF" fill-opacity="0.5"/>
  <!-- Center Pupil (Insight Spark) -->
  <circle cx="60" cy="55" r="6" fill="#FFFFFF"/>
  <!-- Connecting line downward to form a T-pillar representation -->
  <line x1="60" y1="90" x2="60" y2="110" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
</svg>
