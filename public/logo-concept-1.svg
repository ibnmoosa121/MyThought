<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Concept 1: The Minimalist Synapse Node (Precision Tech & Strategy) -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.2"/>
  <!-- Intersecting thought paths -->
  <path d="M 35 45 L 60 30 L 85 45 L 60 90 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 35 75 L 60 90 L 85 75 L 60 30 Z" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="4 4" stroke-opacity="0.7"/>
  <!-- Connecting diagonal core lines -->
  <line x1="35" y1="45" x2="85" y2="75" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="35" y1="75" x2="85" y2="45" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Synaptic nodes -->
  <circle cx="60" cy="30" r="4" fill="#FFFFFF"/>
  <circle cx="60" cy="90" r="4" fill="#FFFFFF"/>
  <circle cx="35" cy="45" r="3" fill="#FFFFFF"/>
  <circle cx="85" cy="45" r="3" fill="#FFFFFF"/>
  <circle cx="35" cy="75" r="3" fill="#FFFFFF"/>
  <circle cx="85" cy="75" r="3" fill="#FFFFFF"/>
  <!-- Center Thinking Core -->
  <circle cx="60" cy="60" r="7" fill="#FFFFFF"/>
  <circle cx="60" cy="60" r="14" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.5"/>
</svg>
