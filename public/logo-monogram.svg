<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- 
    "MyThought" Icon - Pure Geometric Monogram (M + T)
    Designed for a premium digital studio & strategic consultancy.
    High-contrast, scalable, and completely original.
  -->
  
  <!-- Outer Frame: Precision Bento/Diamond Envelope -->
  <path 
    d="M 60 10 L 110 38.8 L 110 96.2 L 60 110 L 10 96.2 L 10 38.8 Z" 
    fill="none" 
    stroke="#FFFFFF" 
    stroke-width="1.5" 
    stroke-opacity="0.15" 
    stroke-dasharray="3 3"
  />

  <!-- The "M" Component (The Foundation / Digital Execution) -->
  <path 
    d="M 25 85 L 25 35 L 60 70 L 95 35 L 95 85" 
    fill="none" 
    stroke="#FFFFFF" 
    stroke-width="9" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- The "T" Component (The Apex / Strategic Thought & Direction) -->
  <path 
    d="M 35 35 L 85 35 M 60 35 L 60 95" 
    fill="none" 
    stroke="#FFFFFF" 
    stroke-width="9" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- The Apex Node (The Spark of Insight / Jeddah Focal Point) -->
  <circle 
    cx="60" 
    cy="12" 
    r="5" 
    fill="#FFFFFF"
  />
</svg>
